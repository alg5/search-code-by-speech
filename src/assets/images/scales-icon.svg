<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Тень -->
  <rect x="10" y="200" width="180" height="15" rx="3" fill="#1a5c3a" opacity="0.3"/>
  
  <!-- Корпус весов -->
  <rect x="10" y="20" width="180" height="190" rx="8" fill="#2d7a4f"/>
  <rect x="15" y="25" width="170" height="180" rx="6" fill="#3d9161"/>
  
  <!-- Платформа для взвешивания -->
  <rect x="25" y="35" width="150" height="110" rx="4" fill="#1e5a3a"/>
  <rect x="30" y="40" width="140" height="100" rx="2" fill="#2d7a4f"/>
  
  <!-- Яблоко на весах -->
  <circle cx="100" cy="85" r="30" fill="#4ade80"/>
  <circle cx="100" cy="85" r="25" fill="#86efac"/>
  <ellipse cx="100" cy="62" width="8" height="12" fill="#1e5a3a" transform="rotate(-15 100 62)"/>
  
  <!-- Дисплей -->
  <rect x="25" y="155" width="150" height="45" rx="3" fill="#0f2e1e"/>
  <rect x="30" y="160" width="140" height="35" rx="2" fill="#1a4a2e"/>
  
  <!-- Цифры на дисплее -->
  <text x="100" y="183" font-family="Arial, sans-serif" font-size="24" fill="#4ade80" text-anchor="middle" font-weight="bold">214 g</text>
  
  <!-- Кнопки -->
  <g fill="#1e5a3a">
    <rect x="30" y="210" width="25" height="8" rx="2"/>
    <rect x="60" y="210" width="25" height="8" rx="2"/>
    <rect x="90" y="210" width="25" height="8" rx="2"/>
    <rect x="120" y="210" width="25" height="8" rx="2"/>
    <rect x="150" y="210" width="20" height="8" rx="2"/>
  </g>
  
  <!-- Индикатор питания -->
  <circle cx="175" cy="214" r="3" fill="#4ade80"/>
</svg>