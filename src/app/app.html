<div class="container">
  <h2>Поиск по scale_code</h2>

  <!-- <input [(ngModel)]="searchText" placeholder="Введите текст..." /> -->
  <div class="p-m-3">
 
  <div class="p-d-flex p-jc-center p-ai-center p-flex-wrap p-gap-2">
    
    <!-- Автокомплит занимает большую часть строки -->
    <div class="p-flex-1">
      <p-autoComplete
        [(ngModel)]="searchText"
        [suggestions]="results"
        (completeMethod)="search()"
        field="product_name"
        (onSelect)="selectCode($event)"
        placeholder="Начните вводить название продукта или нажмите 🎤"
        [forceSelection]="false">
        <ng-template let-item pTemplate="item">
          <!--{{ item.key_ru }}  или getField(item) если планируем мультиязычность -->
          <span [innerHTML]="item.key_ru | highlight:searchText"></span><!-- или getField(item) если планируем мультиязычность -->
        </ng-template>

      </p-autoComplete>
    </div>

    <!-- Кнопка микрофона -->
    <div>
      <button pButton type="button" label="🎤" icon="pi pi-microphone" (click)="startVoiceSearch()"></button>
    </div>

  </div>
</div> 
  <button (click)="search()">Искать</button>
  <button (click)="startVoiceSearch()">🎤 Голос</button>

   <button (click)="simulateVoice()">Тест голосом</button>
    <p>Результат: {{ resultScaleCode }}</p>

  <ul>
    <li *ngFor="let f of results">
      <b>{{f.scale_code}}</b>: {{f.en}} | {{f.ru}} | {{f.he}}
    </li>
  </ul>
</div>
