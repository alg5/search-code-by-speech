<div class="search-wrapper">
  <h2 class="search-title">
    {{ 'search.title' | translate }}
  </h2>

  <div class="search-row">
    <div class="p-inputgroup glossy-search">
      <!-- Лупа слева -->
      <span class="p-inputgroup-addon search-icon">
        <i class="pi pi-search"></i>
      </span>
        <!-- [(ngModel)]="searchText" -->

      <!-- Autocomplete -->
      <p-autoComplete #autoComplete
   [(ngModel)]="searchText"
        (ngModelChange)="searchText.set($event); search({ query: $event })"
         [suggestions]="results()"
        (completeMethod)="search($event)"
        (onSelect)="selectCode($event)"
        [placeholder]="'search.placeholder' | translate"
        [forceSelection]="false"
        field="fieldName"
        class="search-autocomplete">

        <ng-template let-item pTemplate="item">
          <div class="item">
            <span class="code">{{ item.scale_code.toString().padStart(3, '0') }} — </span>
            <span>{{ displayName(item) }}</span>
          </div>
        </ng-template>
      </p-autoComplete>

      <!-- Микрофон справа (РЕАЛЬНЫЙ) -->
      <button
        type="button"
        class="mic-btn"
        (click)="startVoiceSearch()"
        [class.active]="isListening"
        title="🎤 Реальный микрофон">
        <i class="pi pi-microphone"></i>
      </button>
    </div>
  </div>

  <!-- ✅ НОВОЕ: Mock кнопка (только в DEV) -->
  @if (isDev) {
    <div class="dev-controls">
      <button 
        class="mock-btn"
        (click)="startMockSpeech()"
        [class.active]="isListening"
        title="🎭 [DEV] Mock распознавание">
        <i class="pi pi-play"></i>
        <span>Mock Speech</span>
      </button>
      <span class="dev-badge">DEV</span>
    </div>
  }

  <!-- Выбранный результат -->
  <div *ngIf="selectedProduct as p" class="result">
    <div class="code-big">{{ p.scale_code.toString().padStart(3, '0') }} — </div>
    <div class="name">{{ displayName(p) }}</div>
  </div>
</div>
