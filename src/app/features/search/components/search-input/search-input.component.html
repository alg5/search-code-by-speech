<div class="search-wrapper">
  <div class="search-title">
    {{ 'search.title' | translate }}
  </div>
  <div class="voice-input-container">
    @if(!isListening) {
      <div class="subtitle">🎤 {{ 'search.subtitle' | translate }}</div>
    }
    @else {
      <div class="subtitle active">🗣️ {{ 'search.subtitle2' | translate }}</div>
    }
  </div>

  <div class="search-row">
    <div class="p-inputgroup glossy-search">
      <!-- Лупа слева -->
      <span class="p-inputgroup-addon search-icon">
        <i class="pi pi-search"></i>
      </span>

      <!-- Autocomplete -->
      <p-autoComplete #autoComplete
        [(ngModel)]="searchTextValue"
        (ngModelChange)="onSearchTextChange($event)"
        [suggestions]="results()"
        (completeMethod)="search($event)"
        (onSelect)="selectCode($event)"
        [placeholder]="'search.placeholder' | translate"
        [forceSelection]="false"
        field="fieldName"
        class="search-autocomplete">

        <ng-template let-item pTemplate="item">
          <div class="item">
            <span class="code">{{ item.scale_code.toString().padStart(3, '0') }} — </span>
            <span>{{ displayName(item) }}</span>
          </div>
        </ng-template>
      </p-autoComplete>

      <!-- Микрофон справа -->
      <button type="button"
        class="mic-btn"
        (click)="startVoiceSearch()"
        [class.on]="isListening"
        [class.off]="!isListening"
        [attr.title]="isListening 
          ? ('search.tooltip.microphone.off' | translate) 
          : ('search.tooltip.microphone.on' | translate)
        "
        >
        {{ isListening ? '🎙️' : '🎤' }}
      </button>
    </div>
  </div>

  <!-- Mock кнопка для DEV -->
  <div *ngIf="isDev" class="dev-controls">
    <button class="mock-btn"
            (click)="startMockSpeech()"
            [class.active]="isListening"
            title="🎭 [DEV] Mock распознавание">
      <i class="pi pi-play"></i>
      <span>Mock Speech</span>
    </button>
    <span class="dev-badge">DEV</span>
  </div>

  <!-- Выбранный результат -->
  <div *ngIf="selectedProduct as p" class="result">
    <div class="code-big">{{ p.scale_code.toString().padStart(3, '0') }} — </div>
    <div class="name">{{ displayName(p) }}</div>
  </div>
</div>
