<header class="app-header">
  <div class="header-container">
    <!-- Left: Иконка + Breadcrumb + Админ -->
    <!-- Left: Иконка + Breadcrumb + Админ -->
    <div class="header-left">
      <img src="assets/images/scale.svg" alt="Весы" class="logo-icon" />

      @if (isAdmin()) {
        <div class="admin-block">
          <spr-breadcrumb></spr-breadcrumb>

          <div class="admin-actions" (click)="goToAdminDashboard()">
            <a class="admin-dashboard-link">
              <i class="pi pi-cog"></i>
              <span>{{ 'header.admin.dashboard' | translate }}</span>
            </a>
          </div>
        </div>
      }
    </div>

    <!-- Center (desktop only) -->
    <div class="header-subtitle">
      {{ 'header.subtitle' | translate }}
    </div>

    <!-- Right: Время + Язык + Вход -->
    <div class="header-actions">
      <!-- <span class="visit-time">
        {{ visitTime | date:'dd.MM.yyyy HH:mm' }}
      </span> -->
      <spr-lang-switch class="lang-switch"></spr-lang-switch>

      <ng-container *ngIf="!isUserLoggedIn; else loggedInTemplate">
        <div
          class="sign-in-icon-wrapper"
          tabindex="0"
          aria-label="{{ 'auth.signIn' | translate }}"
          title="{{ 'auth.signIn' | translate }}"
          (click)="onSignIn()"
        >
          <i class="pi pi-user sign-in-icon"></i>
        </div>
      </ng-container>

      <ng-template #loggedInTemplate>
        <div class="user-dropdown-wrapper">
          <button
            pButton
            type="button"
            class="p-button-text p-button-plain user-btn"
            (click)="toggleUserMenu()"
          >
            <i class="pi pi-user"></i>
            <i class="pi pi-chevron-down"></i>
          </button>
          <div class="user-dropdown" *ngIf="isUserMenuOpen">
            <button type="button" (click)="onSignOut()">
              <i class="pi pi-sign-out"></i>
              {{ 'auth.signOut' | translate }}
            </button>
          </div>
        </div>
      </ng-template>
    </div>
  </div>
</header>
